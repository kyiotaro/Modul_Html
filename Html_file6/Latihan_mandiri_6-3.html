<!DOCTYPE html>
<html>
<head>
  <title>Latihan_mandiri_6-3</title>
  <link rel="stylesheet" href="Style-mandiri_6-3.css">
</head>
<body>
  <div class="form-container">
    <h2>Formulir Pendaftaran</h2>
    <form>
      
      <label>Nama</label>
      <input type="text" name="Nama">

      <label>Password</label>
      <input type="password" name="Password">

      <label>Tanggal Lahir</label>
      <input type="date" name="Tanggal">

      <label>Jenis Kelamin</label>
      <div class="radio-group">
        <label><input type="radio" name="kelamin"> Laki-laki</label>
        <label><input type="radio" name="kelamin"> Perempuan</label>
      </div>

      <label>Jurusan</label>
      <select>
        <option>RPL</option>
        <option>TKJ</option>
        <option>Animasi</option>
        <option>TL</option>
        <option>TM</option>
        <option>TG</option>
        <option>PH</option>
      </select>

      <label>Hobi</label>
      <div class="checkbox-group">
        <label><input type="checkbox"> Badminton</label>
        <label><input type="checkbox"> Traveling</label>
        <label><input type="checkbox"> Blogging</label>
        <label><input type="checkbox"> Music</label>
        <label><input type="checkbox"> Drawing</label>
        <label><input type="checkbox"> Lainnya</label>
      </div>

      <label>Alamat</label>
      <textarea rows="4"></textarea>

      <div class="button-group">
        <input type="submit" value="Kirim">
        <input type="reset" value="Bersihkan">
      </div>

    </form>
  </div>
</body>
</html>
