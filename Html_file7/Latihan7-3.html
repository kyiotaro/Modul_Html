<!DOCTYPE html>
<html>
  <head>
    <title>Latihan7-3</title>
    <style>
      body {
        font-family: Sans-Serif;
        margin: 0;
        padding: 0;
      }
      .Profile-container {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
        padding: 20px;
        max-width: 800px;
        margin: auto;
        background: #f0f0f0;
      }
      .Profile-picture {
        background-color: #ccc;
        width: 100%;
        aspect-ratio: 1/1;
      }
      Profile-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .Profile-info h2 {
        margin: 0;
      }
      .Profile-info p {
        margin: 10px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="Profile-container">
      <div class="Profile-picture"></div>
      <div class="Profile-info">
        <h2>John doe</h2>
        <p>Web Developer | Javascript Enthusiast | Tech Blogger</p>
      </div>
    </div>
  </body>
</html>
