<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>latihan10-1</title>
</head>
<body>
  <p id="intro">Hello world</p>
  <p>This example demonstrates the <b>getElementById</b> mothod!</p>
  <p id="demo"></p>
  
  <script>
    myElement = document.getElementById("intro");
    document.getElementById("demo").innerHTML = "The text from the intro paragraph is " + myElement.innerHTML;
  </script>
</body>
</html>
