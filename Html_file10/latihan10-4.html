<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>latihan10-4</title>
</head>
<body>
  <form id="frm1" action="form_action.php">
    First name: <input type="text" name="fname" value= "Pemrograman"><br>
    Last name: <input type="text" name="lname" value= "Web"><br><br>
    <input type="submit" value="Submit">
  </form>
  
  <p>Click "Try it" to display the value of each element in the form.</p>
  <button onclick= "myFunction()">Try it</button>
  <p id="demo"></p>
  <script>
    function myFunction() {
      var x = document.getElementById("frm1"); var text = "";
      var i;
      for (i = 0; i < x.length; i++){
        text += x.elements[i].value + "<br>";
      }
      document.getElementById("demo").innerHTML = text;
    }
  </script>
</body>
</html>
