<!DOCTYPE html>
<html lang="en">
<head>
  <title>percabangan switch</title>
</head>
<body>
  <script>
    function tanyabulan(){
      let bulan = parseFloat(document.fform.ibulan.value);
      let namabulan = " ";
      
      switch (bulan){
        case 1:
          namabulan ="Bulan ke 1 = januari";
          break;
        case 2:
          namabulan ="Bulan ke 2 = februari";
          break;
        case 3:
          namabulan ="Bulan ke 3 = maret";
          break;
        case 4:
          namabulan ="Bulan ke 4 = april";
          break;
        case 5:
          namabulan ="Bulan ke 5 = mei";
          break;
        case 6:
          namabulan ="Bulan ke 6 = juni";
          break;
        case 7:
          namabulan ="Bulan ke 7 = juli";
          break;
        case 8:
          namabulan ="Bulan ke 8 = agustus";
          break;
        case 9:
          namabulan ="Bulan ke 9 = september";
          break;
        case 10:
          namabulan ="Bulan ke 10 = oktober";
          break;
        case 11:
          namabulan ="Bulan ke 11 = november";
          break;
        case 12:
          namabulan ="Bulan ke 12 = desember";
          break;
        default:
          namabulan = "Anda salah mengisi";
      }
      alert(namabulan);
    }
  </script>
  <form name = "fform">
    <h2>Penggunaan percabangan switch</h2>
    <hr>
    <pre>
      Masukkan no bulan [1-12] : <input type="text" size="2" name="ibulan">
      <input type="button" value="hitung" onclick="tanyabulan()">
      <input type="reset" value="ulang"
    </pre>
  </form>
</body>
</html>
