<!DOCTYPE HTML>
<html lang="eng">
  <head>
    <title>Percabangan if/else</title>
  </head>
  <body>
    <script>
      let password = prompt("password:");
      
      if(password == "kopi"){
        document.write("<h2>Selamat datang</h2>");
      }else {
        document.write("<p>Password salah, coba lagi</p>");
      }
      document.write("<p>Terimakasih telah menggunakan aplikasi ini</p>");

    </script>
  </body>
</html>
