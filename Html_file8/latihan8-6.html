<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latihan 8.6</title>
</head>

<body>
  <script>
    var deret = prompt("Masukkan Jumlah Deret :");
    document.writeln("<h2>Latihan Perulangan While</h2>");
    document.writeln("---------------------------------------------------");
    document.writeln("<br>");
    var jumlah = 0.0;
    var angka = 1;
    while (angka <= deret) {
      jumlah = jumlah + angka;
      angka++
    }
    document.writeln("<br>");
    document.writeln("Jumlah Deret dari 1 sampai " + deret + " adalah =" + jumlah);
    document.writeln("<br>");
    document.writeln("---------------------------------------------------");
  </script>
</body>

</html>
