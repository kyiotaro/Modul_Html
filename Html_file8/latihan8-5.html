<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latihan 8.5</title>
</head>

<body>
  <script>
    document.writeln("<h2>Latihan Perulangan for</h2>");
    document.writeln("------------------------------------------------");
    for (let i = 1; i <= 10; i++) {
      let sq = i * i;
      document.writeln("<pre>");
      document.writeln("Angka : " + i + " Kuadrat : " + sq + "<br>");
      document.writeln("</pre>");
    }
    document.writeln("------------------------------------------------");
  </script>
</body>

</html>
